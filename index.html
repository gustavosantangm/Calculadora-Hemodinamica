<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Calculadora Hemodinâmica</title>
  
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" type="image/png">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1077/1077114.png">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      background: #f8f9fa;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #1e3a8a;
      margin-bottom: 25px;
    }
    label {
      font-weight: bold;
      display: block;
      margin: 15px 0 5px 0;
      color: #1e40af;
    }
    input {
      width: 100%;
      max-width: 360px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 17px;
    }
    button {
      background: #1e40af;
      color: white;
      font-size: 18px;
      font-weight: bold;
      padding: 14px;
      width: 100%;
      max-width: 360px;
      border: none;
      border-radius: 8px;
      margin-top: 20px;
      cursor: pointer;
    }
    button:active {
      background: #1e3a8a;
    }
    .resultado {
      background: #e0f2fe;
      padding: 20px;
      border-radius: 10px;
      margin-top: 25px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <h1>Calculadora Hemodinâmica</h1>

  <label>BSA (Superfície Corpórea - m²):</label>
  <input type="number" id="bsa" value="1.9" step="0.01">

  <label>PaO₂ (mmHg):</label>
  <input type="number" id="pao2" value="95" step="1">

  <label>PvO₂ (mmHg):</label>
  <input type="number" id="pvo2" value="40" step="1">

  <label>SaO₂ (%):</label>
  <input type="number" id="sao2" value="98" step="0.1">

  <label>SvO₂ (%):</label>
  <input type="number" id="svo2" value="75" step="0.1">

  <label>Hemoglobina (g/dL):</label>
  <input type="number" id="hb" value="13" step="0.1">

  <label>Débito Cardíaco (L/min):</label>
  <input type="number" id="co" value="5.2" step="0.1">

  <label>PAM (mmHg):</label>
  <input type="number" id="pam" value="82" step="1">

  <label>CVP (mmHg):</label>
  <input type="number" id="cvp" value="8" step="1">

  <label>GAP CO₂ (mmHg):</label>
  <input type="number" id="gapco2" value="6" step="0.1">

  <button id="btnCalcular">Calcular</button>

  <div class="resultado" id="resultado">Preencha os campos e clique em Calcular.</div>

  <script>
    function calcular() {
      const bsa   = parseFloat(document.getElementById('bsa').value) || 1.9;
      const pao2  = parseFloat(document.getElementById('pao2').value) || 95;
      const pvo2  = parseFloat(document.getElementById('pvo2').value) || 40;
      const sao2  = parseFloat(document.getElementById('sao2').value) / 100 || 0.98;
      const svo2  = parseFloat(document.getElementById('svo2').value) / 100 || 0.75;
      const hb    = parseFloat(document.getElementById('hb').value) || 13;
      const co    = parseFloat(document.getElementById('co').value) || 5;
      const pam   = parseFloat(document.getElementById('pam').value) || 80;
      const cvp   = parseFloat(document.getElementById('cvp').value) || 8;
      const gapco2 = parseFloat(document.getElementById('gapco2').value) || 6;

      const cao2 = (1.34 * hb * sao2) + (0.0031 * pao2);
      const cvo2 = (1.34 * hb * svo2) + (0.0031 * pvo2);
      
      const do2  = cao2 * co * 10;
      const vo2  = (cao2 - cvo2) * co * 10;
      const o2er = ((cao2 - cvo2) / cao2) * 100;
      const ci   = co / bsa;
      const svri = ((pam - cvp) * 80) / ci;
      const rq   = gapco2 / ((cao2 - cvo2) || 1);

      let analise = "<strong>Análise:</strong><br>";

      if (ci < 2.2) analise += "⚠️ Índice Cardíaco baixo (hipodinamia).<br>";
      else if (ci > 4.0) analise += "🔥 Índice Cardíaco elevado (hiperdinamia).<br>";
      else analise += "✅ Índice Cardíaco normal.<br>";

      if (o2er > 40) analise += "⚠️ Taxa de extração de O₂ muito elevada.<br>";
      else if (o2er < 20) analise += "✅ Boa reserva de oxigênio.<br>";
      else analise += "✅ Taxa de extração adequada.<br>";

      if (svri > 2400) analise += "🔴 SVRI elevada (vasoconstrição).<br>";
      else if (svri < 1200) analise += "🔴 SVRI baixa (vasodilatação).<br>";
      else analise += "✅ SVRI normal.<br>";

      if (rq > 1.0) analise += "⚠️ Quociente Respiratório elevado.<br>";
      if (do2 < 500) analise += "⚠️ DO₂ baixa.<br>";

      document.getElementById('resultado').innerHTML = `
        <h2>Resultados</h2>
        <p><strong>DO₂:</strong> ${do2.toFixed(0)} mL/min</p>
        <p><strong>VO₂:</strong> ${vo2.toFixed(0)} mL/min</p>
        <p><strong>O₂ER:</strong> ${o2er.toFixed(1)}%</p>
        <p><strong>Índice Cardíaco (CI):</strong> ${ci.toFixed(2)} L/min/m²</p>
        <p><strong>SVRI:</strong> ${svri.toFixed(0)} dyn·s·cm⁻⁵·m²</p>
        <p><strong>RQ estimado:</strong> ${rq.toFixed(2)}</p>
        <hr>
        ${analise}
      `;
    }

    document.getElementById('btnCalcular').addEventListener('click', calcular);
  </script>
</body>
</html>
